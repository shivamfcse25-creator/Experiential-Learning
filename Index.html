<!DOCTYPE html>
<html>
<head>
<title>Skyline Properties</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; }
.card:hover { transform:scale(1.05); transition:0.3s; }
.card img { height:200px; object-fit:cover; }
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar bg-dark p-3">
<span class="text-white fs-4">🏠 Skyline Properties</span>

<select id="price" class="form-select w-25">
<option value="all">All Prices</option>
<option value="50">Below 50L</option>
<option value="100">50L-1Cr</option>
<option value="101">Above 1Cr</option>
</select>

<select id="bhk" class="form-select w-25">
<option value="all">All BHK</option>
<option value="1">1 BHK</option>
<option value="2">2 BHK</option>
<option value="3">3 BHK</option>
</select>
</nav>

<!-- Properties -->
<div class="container mt-4">
<div class="row g-4">

<div class="col-md-4 prop" data-price="45" data-bhk="1">
<div class="card">
<img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
<div class="card-body">
<h5>1 BHK</h5>
<p>₹45L</p>
</div>
</div>
</div>

<div class="col-md-4 prop" data-price="60" data-bhk="2">
<div class="card">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<div class="card-body">
<h5>2 BHK</h5>
<p>₹60L</p>
</div>
</div>
</div>

<div class="col-md-4 prop" data-price="120" data-bhk="3">
<div class="card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<div class="card-body">
<h5>3 BHK</h5>
<p>₹1.2Cr</p>
</div>
</div>
</div>

</div>
</div>

<!-- JS Filter -->
<script>
let price = document.getElementById("price");
let bhk = document.getElementById("bhk");
let props = document.querySelectorAll(".prop");

function filter(){
props.forEach(p=>{
let pr = p.dataset.price;
let b = p.dataset.bhk;

let show = true;

if(price.value!="all"){
if(price.value=="50" && pr>=50) show=false;
if(price.value=="100" && (pr<50 || pr>100)) show=false;
if(price.value=="101" && pr<=100) show=false;
}

if(bhk.value!="all" && bhk.value!=b) show=false;

p.style.display = show ? "block":"none";
});
}

price.onchange = filter;
bhk.onchange = filter;
</script>

</body>
</html>
